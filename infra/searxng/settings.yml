use_default_settings: true

general:
  debug: false
  instance_name: "Learnloom Source Discovery"

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "overridden-by-SEARXNG_SECRET"
  # This endpoint is reachable only on the private Compose network and the
  # loopback development port. Learnloom applies its own bounded query policy.
  limiter: false
  image_proxy: false

valkey:
  url: valkey://searxng-valkey:6379/0
