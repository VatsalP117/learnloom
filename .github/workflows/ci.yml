name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: learnloom_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d learnloom_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go vet ./cmd/... ./internal/...
      - run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./cmd/... ./internal/...
      - run: go test -race ./cmd/... ./internal/...
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/learnloom_test?sslmode=disable
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./cmd/... ./internal/...
      - run: npm audit --audit-level=high
      - run: docker build --build-arg VITE_CLERK_PUBLISHABLE_KEY=pk_test_placeholder .
