services:
  learnloom:
    build:
      context: .
    image: learnloom:0.2
    env_file:
      - path: .env
        required: false
    environment:
      LEARNLOOM_HOME: /data
    volumes:
      - ./config.json:/app/config.json:ro
      - learnloom-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    restart: "no"

volumes:
  learnloom-data:

