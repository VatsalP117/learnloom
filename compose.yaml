name: learnloom

x-app: &app
  image: learnloom:dev
  build:
    context: .
    args:
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?set VITE_CLERK_PUBLISHABLE_KEY}
      VITE_LEARNLOOM_ROOT_DOMAIN: ${VITE_LEARNLOOM_ROOT_DOMAIN:-learnloom.test}
  read_only: true
  tmpfs:
    - /tmp:size=64m,noexec,nosuid
  security_opt:
    - no-new-privileges:true
  networks:
    - backend

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: learnloom
      POSTGRES_USER: learnloom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnloom -d learnloom"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    volumes:
      - object-data:/data
    networks:
      - backend

  create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >
        until mc alias set local http://minio:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"; do sleep 1; done;
        mc mb --ignore-existing "local/$$S3_BUCKET"
    environment:
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    networks:
      - backend

  migrate:
    <<: *app
    command: ["migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    <<: *app
    command: ["web"]
    environment:
      LEARNLOOM_ENV: ${LEARNLOOM_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: :3000
      LEARNLOOM_ROOT_DOMAIN: ${LEARNLOOM_ROOT_DOMAIN:?set LEARNLOOM_ROOT_DOMAIN}
      LEARNLOOM_APP_ORIGIN: ${LEARNLOOM_APP_ORIGIN:?set LEARNLOOM_APP_ORIGIN}
      CSRF_SECRET: ${CSRF_SECRET:?set CSRF_SECRET}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-false}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?set CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?set CLERK_SECRET_KEY}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:?set CLERK_WEBHOOK_SECRET}
      CLERK_FRONTEND_ORIGIN: ${CLERK_FRONTEND_ORIGIN:-}
      SOURCE_DISCOVERY_ENABLED: ${SOURCE_DISCOVERY_ENABLED:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      create-bucket:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  worker:
    <<: *app
    command: ["worker"]
    environment:
      LEARNLOOM_ENV: ${LEARNLOOM_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_METRICS_ADDR: :9090
      LEARNLOOM_ROOT_DOMAIN: ${LEARNLOOM_ROOT_DOMAIN:?set LEARNLOOM_ROOT_DOMAIN}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-false}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.deepseek.com}
      MODEL_API_KEY: ${MODEL_API_KEY:?set MODEL_API_KEY}
      MODEL_NAME: ${MODEL_NAME:-deepseek-chat}
      RESEND_API_KEY: ${RESEND_API_KEY:?set RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:?set RESEND_FROM}
      RESEND_SUBJECT_PREFIX: ${RESEND_SUBJECT_PREFIX:-Learnloom}
      SOURCE_DISCOVERY_ENABLED: ${SOURCE_DISCOVERY_ENABLED:-false}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080}
      SEARXNG_TIMEOUT: ${SEARXNG_TIMEOUT:-8s}
      SOURCE_DISCOVERY_MAX_QUERIES: ${SOURCE_DISCOVERY_MAX_QUERIES:-4}
      SOURCE_DISCOVERY_MAX_CANDIDATES: ${SOURCE_DISCOVERY_MAX_CANDIDATES:-30}
      SOURCE_DISCOVERY_MAX_ACTIVE: ${SOURCE_DISCOVERY_MAX_ACTIVE:-8}
      SOURCE_FETCH_CONCURRENCY: ${SOURCE_FETCH_CONCURRENCY:-4}
      SOURCE_MIN_USABLE_ITEMS: ${SOURCE_MIN_USABLE_ITEMS:-4}
      SOURCE_TARGET_USABLE_ITEMS: ${SOURCE_TARGET_USABLE_ITEMS:-8}
      SOURCE_REFRESH_INTERVAL: ${SOURCE_REFRESH_INTERVAL:-12h}
      SOURCE_DEFAULT_MAX_STALE_AGE: ${SOURCE_DEFAULT_MAX_STALE_AGE:-720h}
    depends_on:
      migrate:
        condition: service_completed_successfully
      create-bucket:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  searxng:
    profiles: ["discovery"]
    image: docker.io/searxng/searxng:2026.7.18-277d8469c
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-development-only-change-me}
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_VALKEY_URL: valkey://searxng-valkey:6379/0
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    depends_on:
      searxng-valkey:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    restart: unless-stopped

  searxng-valkey:
    profiles: ["discovery"]
    image: docker.io/valkey/valkey:9.0.3-alpine
    command: ["valkey-server", "--save", "30", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - searxng-valkey-data:/data
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  object-data:
  searxng-cache:
  searxng-valkey-data:

networks:
  backend:
