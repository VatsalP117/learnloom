name: learnloom

x-app: &app
  image: ${LEARNLOOM_IMAGE:-learnloom-app}:${LEARNLOOM_IMAGE_TAG:-production}
  build:
    context: .
    dockerfile: Dockerfile
    args:
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?set VITE_CLERK_PUBLISHABLE_KEY}
      VITE_LEARNLOOM_ROOT_DOMAIN: ${VITE_LEARNLOOM_ROOT_DOMAIN:-learnloom.blog}
  read_only: true
  tmpfs:
    - /tmp:size=64m,noexec,nosuid
  security_opt:
    - no-new-privileges:true
  networks:
    - backend

x-runtime: &runtime
  LEARNLOOM_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LEARNLOOM_ROOT_DOMAIN: ${LEARNLOOM_ROOT_DOMAIN:-learnloom.blog}
  ALLOW_INSECURE_PRIVATE_SERVICES: "true"
  DATABASE_URL: postgresql://learnloom:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/learnloom?sslmode=disable

x-object-store: &object-store
  S3_BUCKET: ${S3_BUCKET:-learnloom-dossiers}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
  S3_USE_PATH_STYLE: "true"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: learnloom
      POSTGRES_USER: learnloom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnloom -d learnloom"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - backend
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:-learnloom-minio}:RELEASE.2025-10-15T17-29-55Z
    build:
      context: https://github.com/minio/minio.git#RELEASE.2025-10-15T17-29-55Z
      dockerfile: Dockerfile.release
      args:
        RELEASE: RELEASE.2025-10-15T17-29-55Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    volumes:
      - object-data:/data
    networks:
      - backend
    restart: unless-stopped

  create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >
        until mc alias set local http://minio:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"; do sleep 1; done;
        mc mb --ignore-existing "local/$$S3_BUCKET"
    environment:
      S3_BUCKET: ${S3_BUCKET:-learnloom-dossiers}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    networks:
      - backend
    restart: "no"

  migrate:
    <<: *app
    command: ["migrate"]
    environment:
      <<: *runtime
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    <<: *app
    command: ["web"]
    environment:
      <<: [*runtime, *object-store]
      HTTP_ADDR: :3000
      LEARNLOOM_APP_ORIGIN: ${LEARNLOOM_APP_ORIGIN:-https://app.learnloom.blog}
      CSRF_SECRET: ${CSRF_SECRET:?set CSRF_SECRET}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?set CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?set CLERK_SECRET_KEY}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:?set CLERK_JWT_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:?set CLERK_WEBHOOK_SECRET}
      CLERK_FRONTEND_ORIGIN: ${CLERK_FRONTEND_ORIGIN:?set CLERK_FRONTEND_ORIGIN}
      SOURCE_DISCOVERY_ENABLED: ${SOURCE_DISCOVERY_ENABLED:-true}
    depends_on:
      migrate:
        condition: service_completed_successfully
      create-bucket:
        condition: service_completed_successfully
    expose:
      - "3000"
    restart: unless-stopped

  worker:
    <<: *app
    command: ["worker"]
    environment:
      <<: [*runtime, *object-store]
      WORKER_METRICS_ADDR: :9090
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.deepseek.com}
      MODEL_API_KEY: ${MODEL_API_KEY:?set MODEL_API_KEY}
      MODEL_NAME: ${MODEL_NAME:-deepseek-chat}
      MODEL_TIMEOUT: ${MODEL_TIMEOUT:-10m}
      MODEL_RETRIES: ${MODEL_RETRIES:-2}
      MODEL_MAX_TOKENS: ${MODEL_MAX_TOKENS:-8192}
      RESEND_API_KEY: ${RESEND_API_KEY:?set RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:?set RESEND_FROM}
      RESEND_SUBJECT_PREFIX: ${RESEND_SUBJECT_PREFIX:-Learnloom}
      SOURCE_DISCOVERY_ENABLED: ${SOURCE_DISCOVERY_ENABLED:-true}
      SEARXNG_BASE_URL: http://searxng:8080
      SEARXNG_TIMEOUT: ${SEARXNG_TIMEOUT:-8s}
      SOURCE_DISCOVERY_MAX_QUERIES: ${SOURCE_DISCOVERY_MAX_QUERIES:-4}
      SOURCE_DISCOVERY_MAX_CANDIDATES: ${SOURCE_DISCOVERY_MAX_CANDIDATES:-30}
      SOURCE_DISCOVERY_MAX_ACTIVE: ${SOURCE_DISCOVERY_MAX_ACTIVE:-8}
      SOURCE_MIN_USABLE_ITEMS: ${SOURCE_MIN_USABLE_ITEMS:-4}
      SOURCE_TARGET_USABLE_ITEMS: ${SOURCE_TARGET_USABLE_ITEMS:-8}
      SOURCE_REFRESH_INTERVAL: ${SOURCE_REFRESH_INTERVAL:-12h}
      SOURCE_DEFAULT_MAX_STALE_AGE: ${SOURCE_DEFAULT_MAX_STALE_AGE:-720h}
    depends_on:
      migrate:
        condition: service_completed_successfully
      create-bucket:
        condition: service_completed_successfully
      searxng:
        condition: service_started
    restart: unless-stopped

  searxng:
    image: ${SEARXNG_IMAGE_NAME:-learnloom-searxng}:2026.7.18
    build:
      context: ./infra/searxng
      dockerfile: Dockerfile
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET}
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_VALKEY_URL: valkey://searxng-valkey:6379/0
    volumes:
      - searxng-cache:/var/cache/searxng
    depends_on:
      searxng-valkey:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  searxng-valkey:
    image: docker.io/valkey/valkey:9.0.3-alpine
    command: ["valkey-server", "--save", "30", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - searxng-valkey-data:/data
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  object-data:
  searxng-cache:
  searxng-valkey-data:

networks:
  backend:
